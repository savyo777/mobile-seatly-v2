plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.cenaiva.socialshare'
version = '1.0.0'

android {
  namespace "com.cenaiva.socialshare"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  implementation 'com.facebook.react:react-android'
}

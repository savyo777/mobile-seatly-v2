# Verifies the OAuth buttons render on the sign-in screen. We DON'T
# complete the OAuth handshake — that requires real Google / Apple
# credentials. We just assert the buttons are visible.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- tapOn: "Sign in"
- assertVisible: "Continue with Google"
- assertVisible: "Continue with Apple"

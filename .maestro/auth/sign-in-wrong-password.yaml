# Verifies the email-sign-in error path:
#   - Sign-in submit fires the request
#   - The submit button gates on `submitting` (no double-tap)
#   - On failure, friendlyError() surfaces a human-readable alert
#   - The lockout counter on the server side increments
#
# Uses a deliberately wrong password. Doesn't create the account
# or change state — pure read-only verification.

appId: com.cenaiva.app
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- assertVisible: "Welcome to Cenaiva"
- tapOn: "Sign in"
- assertVisible: "Welcome back"
- tapOn:
    id: "input-email"
    optional: true
- inputText: "test-wrong@cenaiva.local"
- tapOn: "Password"
- inputText: "thisIsNotMyPassword!"
- tapOn: "Log In"
# After tap, the button should briefly disable. Then the failure alert.
- assertVisible:
    text: "Sign in failed"
    timeout: 10000
- tapOn: "OK"
- assertVisible: "Welcome back"

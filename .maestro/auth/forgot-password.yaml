# Forgot-password flow: submit an email, assert the "Check your email"
# confirmation screen renders.

appId: com.cenaiva.app
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- tapOn: "Sign in"
- tapOn: "Forgot Password?"
- assertVisible: "Reset password"
- tapOn: "Email"
- inputText: "test-forgot@cenaiva.local"
- tapOn: "Send reset link"
- assertVisible:
    text: "Check your email"
    timeout: 10000

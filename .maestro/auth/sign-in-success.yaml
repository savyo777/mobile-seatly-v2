# Real-credential sign-in test. Verifies an owner/customer account
# can sign in with email+password and land on the role-appropriate
# shell (Discover for customer, Home/Restaurant dashboard for owner).
#
# Usage:
#   maestro test .maestro/auth/sign-in-success.yaml \
#     --env MAESTRO_EMAIL=you@example.com \
#     --env MAESTRO_PASSWORD=...

appId: com.cenaiva.app
---
- runFlow: ../_subflows/sign-in-with-creds.yaml
# sign-in-with-creds already asserts we land on the role-appropriate
# shell, so this test is a thin pass-through verifying the subflow
# works end-to-end against real Supabase auth.

# Smoke flow — sanity check that the app boots, the JS bundle loads,
# the cookie-consent sheet renders, and we can interact with it.
# Run before every Phase 4 batch as a "is the app fundamentally
# alive" gate.
#
# The dev-launcher + onboarding + cookie-sheet machinery is shared
# with every authenticated flow; it lives in _subflows/boot-to-app.yaml
# so iOS-26 + Android selector quirks get fixed in exactly one place.

appId: com.cenaiva.app
---
- runFlow: _subflows/boot-to-app.yaml

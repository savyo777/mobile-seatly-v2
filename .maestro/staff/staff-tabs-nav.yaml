# Staff bottom-tab navigation. The owner shell (app/(staff)/_layout.tsx)
# exposes five tabs:
#   home          → "Home"
#   reservations  → "Bookings"
#   expenses      → "Expenses"
#   promotions    → "Promos"
#   profile       → "Business"
#
# This flow only runs when the keychain restores a staff session; if we
# land in the customer shell instead, we exit early without failing.
# iOS exposes tab labels as e.g. "Home, tab, 1 of N"; Android exposes
# them as just "Home". The regex matches both with an optional ", tab…"
# suffix.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- runFlow:
    when:
      visible: "Welcome to Cenaiva"
    commands:
      - tapOn:
          text: ".*Sign in"
- runFlow:
    when:
      visible:
        text: "^Home(, tab.*)?$"
    commands:
      - tapOn:
          text: "^Bookings(, tab.*)?$"
      - extendedWaitUntil:
          visible:
            text: "^Bookings(, tab.*)?$"
          timeout: 15000
      - tapOn:
          text: "^Expenses(, tab.*)?$"
      - extendedWaitUntil:
          visible:
            text: "^Expenses(, tab.*)?$"
          timeout: 15000
      - tapOn:
          text: "^Promos(, tab.*)?$"
      - extendedWaitUntil:
          visible:
            text: "^Promos(, tab.*)?$"
          timeout: 15000
      - tapOn:
          text: "^Business(, tab.*)?$"
      - extendedWaitUntil:
          visible:
            text: "^Business(, tab.*)?$"
          timeout: 15000
      - tapOn:
          text: "^Home(, tab.*)?$"
      - extendedWaitUntil:
          visible:
            text: "^Home(, tab.*)?$"
          timeout: 15000

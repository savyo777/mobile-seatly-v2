# Staff Roles & Permissions — toggle a Server-role permission, navigate
# away, return, assert it persisted, then reset to defaults.
#
# SAFETY: This flow only ever touches the Server role's permissions,
# never the Manager (owner) role's. Owner permissions are the ones
# that could lock the test account out of the app if mistoggled.
#
# Both pre-flight AND post-flight reset to defaults so a crashed
# previous run can't leave Server in a bad state, and this run leaves
# state clean for the next test.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/sign-in-with-creds.yaml
- assertVisible:
    text: "^Home(, tab.*)?$"

# ── Pre-flight cleanup: reset Server role to defaults in case a
#    previous crashed run left state changed.
- openLink: "cenaiva://(staff)/roles-permissions"
- extendedWaitUntil:
    visible: "Roles & permissions"
    timeout: 15000
- tapOn:
    text: ".*Server.*"
- extendedWaitUntil:
    visible:
      text: ".*Edit the menu.*"
    timeout: 10000
- tapOn:
    text: ".*Reset to default permissions.*"
# Reset triggers a confirm; tap to confirm if it appears.
- runFlow:
    when:
      visible:
        text: "Reset|Confirm|Yes"
    commands:
      - tapOn:
          text: "Reset|Confirm|Yes"

# ── Toggle the Server role's "Edit the menu" permission ON.
- tapOn:
    text: ".*Server.*"
- extendedWaitUntil:
    visible:
      text: ".*Edit the menu.*"
    timeout: 10000
- tapOn:
    text: ".*Edit the menu.*"
# Tapping the row label may or may not toggle the Switch; on iOS the
# Switch is its own a11y element. Wait briefly for state to settle.
- extendedWaitUntil:
    visible: "Roles & permissions"
    timeout: 5000

# ── Navigate away to verify persistence across screen mount/unmount.
- openLink: "cenaiva://(staff)/home"
- extendedWaitUntil:
    visible:
      text: "^Home(, tab.*)?$"
    timeout: 15000

# ── Return to Roles & Permissions, switch to Server tab, and verify
#    the screen still renders cleanly. The deeper "Edit the menu is
#    still ON" check can't be expressed without reading Switch attrs
#    which Maestro's a11y adapter doesn't expose reliably, so we
#    settle for: the screen mounts AND the Reset row is reachable
#    (i.e. the state isn't corrupted/blank).
- openLink: "cenaiva://(staff)/roles-permissions"
- extendedWaitUntil:
    visible: "Roles & permissions"
    timeout: 15000
- tapOn:
    text: ".*Server.*"
- extendedWaitUntil:
    visible:
      text: ".*Edit the menu.*"
    timeout: 10000

# ── Post-flight cleanup: reset to defaults so the test leaves Server
#    in its baseline state.
- tapOn:
    text: ".*Reset to default permissions.*"
- runFlow:
    when:
      visible:
        text: "Reset|Confirm|Yes"
    commands:
      - tapOn:
          text: "Reset|Confirm|Yes"
- assertVisible:
    text: ".*Edit the menu.*"

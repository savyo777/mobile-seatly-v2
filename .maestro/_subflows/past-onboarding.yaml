# Steps through the four onboarding slides via the Next / Get Started
# CTA at the bottom. We avoid the top-right "Skip" because it's in
# the same screen region as the floating Expo dev-menu gear icon,
# and Maestro's tap occasionally hits the gear instead.
#
# iOS exposes the Next button's a11y label with a trailing comma
# ("Next, ") so the matcher uses a regex.

appId: com.cenaiva.app
---
- runFlow:
    when:
      visible:
        text: "Next.*"
    commands:
      - tapOn:
          text: "Next.*"
      - tapOn:
          text: "Next.*"
      - tapOn:
          text: "Next.*"
      - tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Welcome to Cenaiva"
    timeout: 20000

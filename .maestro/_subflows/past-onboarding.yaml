# Steps through the three onboarding slides via the Next / Get Started
# CTA at the bottom — but only if onboarding is actually showing.
#
# Onboarding has 3 slides (Discover, Book, Social) — 2 Next taps then
# Get Started. We avoid the top-right "Skip" because it's in the same
# screen region as the floating Expo dev-menu gear icon and Maestro's
# tap occasionally hits the gear instead.
#
# Branches the flow could land in after boot-to-app:
#   1. Welcome screen — already past onboarding, no-op.
#   2. Onboarding — tap Next×2 then Get Started.
#   3. Authenticated shell (customer Discover or staff Dashboard) —
#      keychain auto-restored a prior session, no onboarding/welcome
#      to skip. No-op so the calling flow can branch on its own.

appId: com.cenaiva.app
---
# Anchor the matcher to the literal "Next" CTA — otherwise it matches
# any visible "Next..." prefix (e.g. "Next slot: 7:30 PM" on a Discover
# restaurant card) and incorrectly enters this branch when the user is
# already signed in.
- runFlow:
    when:
      visible:
        text: "^Next$"
    commands:
      - tapOn:
          text: "^Next$"
      - tapOn:
          text: "^Next$"
      - tapOn: "Get Started"
      - extendedWaitUntil:
          visible: "Welcome to Cenaiva"
          timeout: 20000

# Shared sub-flow that gets the app past every dev-client + cookie
# overlay and into the actual UI. Every named flow runs this first.

appId: com.cenaiva.app
---
# Don't clearState — that revokes permissions Maestro can't re-grant
# inline (microphone, camera, etc.) and surfaces a system dialog
# that's invisible to the iOS a11y tree. ensure-logged-out handles
# auth state; AsyncStorage carryover is fine for our flows.
- launchApp:
    clearState: false
    stopApp: true
# iOS-26 dev launcher shows the section header as "DEVELOPMENT SERVERS"
# (all-caps); previous iOS versions used "Development servers". Accept
# either. The "Development Build" label below the app name is also a
# reliable anchor.
- runFlow:
    when:
      visible:
        text: "DEVELOPMENT SERVERS|Development servers|Development Build"
    commands:
      - tapOn:
          text: "Cenaiva"
          index: 1
      - extendedWaitUntil:
          notVisible:
            text: "DEVELOPMENT SERVERS|Development servers|Development Build"
          timeout: 15000
- extendedWaitUntil:
    visible: "Continue"
    timeout: 60000
    optional: true
- runFlow:
    when:
      visible: "Continue"
    commands:
      # The Continue button can race away while we're tapping (Expo
      # walkthrough auto-dismisses after a few seconds), so make the
      # tap itself optional.
      - tapOn:
          text: "Continue"
          optional: true
      # The dev-menu walkthrough can leave a second "Continue" screen
      # behind it. Try once more.
      - tapOn:
          text: "Continue"
          optional: true
- runFlow:
    when:
      visible: "Open DevTools"
    commands:
      - tapOn:
          text: "Close"
          optional: true
- extendedWaitUntil:
    notVisible: "Open DevTools"
    timeout: 10000
    optional: true
- extendedWaitUntil:
    visible: "Accept all cookies"
    timeout: 30000
    optional: true
- runFlow:
    when:
      visible: "Accept all cookies"
    commands:
      - tapOn: "Accept all cookies"
      - extendedWaitUntil:
          notVisible: "Accept all cookies"
          timeout: 10000

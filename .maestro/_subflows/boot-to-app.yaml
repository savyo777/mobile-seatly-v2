# Shared sub-flow that gets the app past every dev-client + cookie
# overlay and into the actual UI. Every named flow runs this first.

appId: com.cenaiva.app
---
# Don't clearState — that revokes permissions Maestro can't re-grant
# inline (microphone, camera, etc.) and surfaces a system dialog
# that's invisible to the iOS a11y tree. ensure-logged-out handles
# auth state; AsyncStorage carryover is fine for our flows.
- launchApp:
    clearState: false
    stopApp: true
# Give RN a moment to mount the dev launcher screen — otherwise the
# when-check below can race the activity start and skip everything.
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS|Development servers|Development Build|Welcome|Cenaiva"
    timeout: 20000
    optional: true
# iOS-26 dev launcher shows the section header as "DEVELOPMENT SERVERS"
# (all-caps); previous iOS versions used "Development servers". The
# Android dev launcher shows the same header all-caps. The "Development
# Build" subtitle is a reliable secondary anchor.
#
# Row-tap target differs by platform:
#   - iOS labels the server row as "Cenaiva" (the second occurrence —
#     the first is the app-card title).
#   - Android labels the row as the raw URL "http://10.0.2.2:<port>".
# Try iOS first; if "Cenaiva" doesn't match (Android), fall through to
# the URL tap.
- runFlow:
    when:
      visible:
        text: "DEVELOPMENT SERVERS|Development servers|Development Build"
    commands:
      - tapOn:
          text: "Cenaiva"
          index: 1
          optional: true
      - tapOn:
          text: "http://10\\.0\\.2\\.2:80[0-9]+"
          optional: true
      - extendedWaitUntil:
          notVisible:
            text: "DEVELOPMENT SERVERS|Development servers|Development Build"
          timeout: 15000
- extendedWaitUntil:
    visible: "Continue"
    timeout: 60000
    optional: true
- runFlow:
    when:
      visible: "Continue"
    commands:
      # The Continue button can race away while we're tapping (Expo
      # walkthrough auto-dismisses after a few seconds), so make the
      # tap itself optional.
      - tapOn:
          text: "Continue"
          optional: true
      # The dev-menu walkthrough can leave a second "Continue" screen
      # behind it. Try once more.
      - tapOn:
          text: "Continue"
          optional: true
- runFlow:
    when:
      visible: "Open DevTools"
    commands:
      - tapOn:
          text: "Close"
          optional: true
- extendedWaitUntil:
    notVisible: "Open DevTools"
    timeout: 10000
    optional: true
# iOS exposes the long a11y label "Accept all cookies"; Android only
# shows the visible button text "Accept all". Regex covers both.
- extendedWaitUntil:
    visible:
      text: "Accept all( cookies)?"
    timeout: 30000
    optional: true
- runFlow:
    when:
      visible:
        text: "Accept all( cookies)?"
    commands:
      - tapOn:
          text: "Accept all( cookies)?"
      - extendedWaitUntil:
          notVisible:
            text: "Accept all( cookies)?"
          timeout: 10000

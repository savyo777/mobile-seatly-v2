# On the iOS Simulator, the persisted Supabase session in the keychain
# survives `xcrun simctl uninstall` + reinstall, so the app frequently
# boots straight into the customer or staff shell. Flows that need a
# logged-out starting state run this subflow after boot-to-app to
# force the app back to the welcome screen.
#
# Branches:
#   - "Welcome to Cenaiva" already visible → no-op
#   - Owner/staff dashboard visible → Settings tab → Log out
#   - Customer Discover visible → Profile tab → Sign out

appId: com.cenaiva.app
---
# Wait for the app to settle on one of the three possible landing
# states — without this the `when:` conditional checks fire while the
# screen is still transitioning and miss the match.
- extendedWaitUntil:
    visible:
      text: "Restaurant dashboard|Discover, tab.*|Welcome to Cenaiva"
    timeout: 15000
    optional: true
- runFlow:
    when:
      visible: "Restaurant dashboard"
    commands:
      - tapOn:
          text: "Business.*"
      - tapOn: "Log out"
      - tapOn:
          text: "Log out"
          index: 1
- runFlow:
    when:
      visible: "Discover, tab.*"
    commands:
      - tapOn:
          text: "Profile, tab.*"
      - scrollUntilVisible:
          element:
            id: "customer-profile-sign-out"
          direction: DOWN
          timeout: 10000
      - tapOn:
          id: "customer-profile-sign-out"
      # handleLogout signs out without a confirmation dialog; the next
      # screen is /onboarding directly.
- extendedWaitUntil:
    visible: "Welcome to Cenaiva"
    timeout: 15000
    optional: true

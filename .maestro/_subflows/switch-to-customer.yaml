# If we're on the staff shell, deep-link straight into the staff
# Settings screen and tap "Switch to user side". This bypasses the
# 38x38 top-right gear icon on the Business tab, which on iOS-26
# shares pixel space with the Expo dev-client floater and is
# unreliable to tap by id or by coordinate.
#
# No-op if we're already on the customer shell.

appId: com.cenaiva.app
---
- extendedWaitUntil:
    visible:
      text: "Discover, tab.*|Home, tab.*"
    timeout: 30000
- runFlow:
    when:
      visible:
        text: "Home, tab.*"
    commands:
      - openLink: "cenaiva://(staff)/settings"
      - extendedWaitUntil:
          visible: "Switch to user side"
          timeout: 15000
      - tapOn: "Switch to user side"
      - extendedWaitUntil:
          visible:
            text: "Discover, tab.*"
          timeout: 30000

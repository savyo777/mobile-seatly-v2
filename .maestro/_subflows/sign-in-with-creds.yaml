# Boots the app, forces a logged-out state, then signs in with the
# credentials passed via --env MAESTRO_EMAIL/MAESTRO_PASSWORD.
#
# Lands on either the customer Discover shell or the owner Restaurant
# dashboard depending on the account's server role. Caller is
# responsible for any role-specific navigation that follows.
#
# Usage:
#   - runFlow: ../_subflows/sign-in-with-creds.yaml
# Pass creds on the CLI:
#   maestro test ... --env MAESTRO_EMAIL=... --env MAESTRO_PASSWORD=...

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/ensure-logged-out.yaml
# Sign-out clears AsyncStorage, which can resurrect the cookie
# consent sheet. Tolerate either case.
- runFlow:
    when:
      visible: "Accept all cookies"
    commands:
      - tapOn: "Accept all cookies"
      - extendedWaitUntil:
          notVisible: "Accept all cookies"
          timeout: 10000
- runFlow: ../_subflows/past-onboarding.yaml
- extendedWaitUntil:
    visible: "Welcome to Cenaiva"
    timeout: 15000
- tapOn:
    text: ".*Sign in"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 20000
- tapOn:
    id: "login-email-input"
- inputText: ${MAESTRO_EMAIL}
# Drop the soft keyboard before targeting the password field. On
# Android the keyboard covers the lower half of the screen and
# Maestro's tap-by-id treats the obscured element as not-visible,
# so tap-by-id falls through. iOS 26's hideKeyboard is flaky, but
# tapping a static label above the keyboard works on both.
- tapOn:
    text: "Welcome back"
- tapOn:
    id: "login-password-input"
- inputText: ${MAESTRO_PASSWORD}
- tapOn:
    text: "Welcome back"
- tapOn:
    id: "login-submit-button"
# iOS may prompt to save the password as a system sheet. The sheet
# can show up to ~15s after Log In, and Maestro's `when: visible:`
# predicate doesn't reliably see system sheets even when they're in
# the a11y tree. Fire optional taps on "Not Now" twice with retry to
# clear it whenever it shows.
- tapOn:
    text: "Not Now"
    optional: true
    retryTapIfNoChange: false
- tapOn:
    text: "Not Now"
    optional: true
    retryTapIfNoChange: false
- extendedWaitUntil:
    visible:
      text: "^Discover(, tab.*)?$|Restaurant dashboard|^Home(, tab.*)?$"
    timeout: 30000
# If the system sheet is what's masking the final shell, dismiss it
# once more and re-assert.
- tapOn:
    text: "Not Now"
    optional: true
    retryTapIfNoChange: false

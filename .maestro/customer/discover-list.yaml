# Discover list view: assert at least one horizontal section renders.
# Each section title comes from i18n (lib/i18n/locales/en.ts → discover.*):
#   sectionTrending     = "Trending tonight"
#   sectionDateNight    = "Perfect for date night"
#   sectionOutdoor      = "Outdoor seating"
#   sectionTaste        = "Based on your taste"
#   sectionMostSnapped  = "Most snapped this week"
#   sectionNearby       = "Trending in your area"
#
# Sections render conditionally based on user signals + filtered lists, so we
# only need *one* to prove the screen mounted past the hero. This flow only
# runs when the keychain restored a customer session; if we land on Welcome
# (signed-out) we skip the content asserts so the run doesn't fail on a
# state we can't recover from in test.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- runFlow:
    when:
      visible:
        text: "Discover, tab.*"
    commands:
      - extendedWaitUntil:
          visible:
            text: "Trending tonight|Perfect for date night|Outdoor seating|Based on your taste|Most snapped this week|Trending in your area"
          timeout: 30000

# Discover view-mode toggle. The header has two text Pressables labeled
# "List" / "Map". Tapping "Map" swaps the ScrollView body for the
# <DiscoverMapView />. We verify the toggle by confirming "List" becomes
# visible (the alternate button) after tapping "Map".
#
# Only runs when the keychain restored a customer session.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- runFlow:
    when:
      visible:
        text: "^Discover(, tab.*)?$"
    commands:
      - extendedWaitUntil:
          visible: "Map"
          timeout: 30000
      - tapOn: "Map"
      - extendedWaitUntil:
          visible: "List"
          timeout: 15000
      - tapOn: "List"

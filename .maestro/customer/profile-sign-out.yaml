# Profile → Sign out flow. The Profile tab's bottom row renders a
# Pressable whose Text reads "Sign out" (app/(customer)/profile/index.tsx).
# After signOut(), the screen calls router.replace('/onboarding'), so we
# expect to land back at onboarding / welcome.
#
# Only runs when the keychain restored a customer session — there's no
# Profile tab to sign out from on Welcome.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- runFlow:
    when:
      visible:
        text: "Profile, tab.*"
    commands:
      - tapOn:
          text: "Profile, tab.*"
      # Sign out is at the bottom of the 4-page profile — scroll until visible.
      - scrollUntilVisible:
          element:
            text: "Sign out"
          direction: DOWN
          timeout: 30000
      - tapOn: "Sign out"
      # router.replace('/onboarding') → either onboarding (Next button)
      # or Welcome (Sign in) depending on whether onboarding was cached.
      - extendedWaitUntil:
          visible:
            text: "Next.*|Get Started|Welcome to Cenaiva|.*Sign in"
          timeout: 20000

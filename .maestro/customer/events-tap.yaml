# Customer tab navigation: tap the Events tab and assert it renders.
# Empty state copy is "No events found" / "No results found" depending
# on filters; we don't pin to either since the supabase data path may
# return real rows in production.
#
# Only runs when the keychain restored a customer session.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- runFlow:
    when:
      visible:
        text: "^Events(, tab.*)?$"
    commands:
      - tapOn:
          text: "^Events(, tab.*)?$"
      - extendedWaitUntil:
          visible:
            text: "TORONTO|Events|No events"
          timeout: 20000

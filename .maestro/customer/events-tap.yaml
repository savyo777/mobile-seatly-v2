# Customer tab navigation: tap the Events tab and assert the screen
# header renders. Empty state copy is "No events found" / "No results
# found" depending on filters; we don't pin to either since the
# supabase data path may return real rows in production.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/boot-to-app.yaml
- runFlow: ../_subflows/past-onboarding.yaml
- runFlow:
    when:
      visible: "Welcome to Cenaiva"
    commands:
      - tapOn: "Sign in"
# iOS exposes the tab label as "Events, tab, 2 of 17", so we anchor
# the regex on that substring.
- tapOn:
    text: "Events, tab.*"
- extendedWaitUntil:
    visible:
      text: ".*Events.*"
    timeout: 20000

# Customer booking E2E. Signs in (via the staff→customer subflow
# because our test account is owner-role), then walks the hero
# "Reserve now" CTA through review → preorder → final review → the
# Stripe PaymentSheet trigger.
#
# Booking route map:
#   /(customer)/discover  → "Reserve now"
#   /booking/{id}/step2-time   (date, time, party)   → "Continue"
#   /booking/{id}/confirm      (review: name/email)  → "Continue to menu"
#   /booking/{id}/step4-preorder (preorder; Skip if no preorder)
#   /booking/{id}/step5-review (final review)        → "Next"
#   /booking/{id}/step6-payment (Stripe PaymentSheet)
#
# Stripe is in test mode; card 4242 4242 4242 4242, exp 12/30, CVC 123,
# zip 10001. The Stripe PaymentSheet UI is native; if its selectors
# drift, this flow will stop at the Confirm Booking button rather than
# completing the purchase. Manual QA still required for actual Stripe
# tap-through.

appId: com.cenaiva.app
---
- runFlow: ../_subflows/sign-in-with-creds.yaml
- runFlow: ../_subflows/switch-to-customer.yaml
- assertVisible:
    text: "Discover, tab.*"

# Discover hero → Reserve now
- extendedWaitUntil:
    visible: "Reserve now"
    timeout: 15000
- tapOn:
    id: "discover-hero-reserve-cta"

# step2-time: pick the default slot, hit Continue
- extendedWaitUntil:
    visible: "Available times"
    timeout: 20000
- tapOn: "Continue"

# confirm.tsx: review reservation; the form is pre-filled from the
# signed-in account, so we just hit Continue to menu.
- extendedWaitUntil:
    visible: "Continue to menu"
    timeout: 20000
- tapOn: "Continue to menu"

# step4-preorder: Skip preorder to keep the flow deterministic.
- extendedWaitUntil:
    visible:
      text: "Skip|Continue to Pre-Pay|Next"
    timeout: 20000
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

# step4 Skip routes directly to step7-confirmation when the booking
# has no deposit and no preorder cart (most common case). Wait for
# the reservation-confirmed screen.
- extendedWaitUntil:
    visible:
      text: "You're all set.*|Your table is booked.*|Booking confirmed"
    timeout: 60000
- assertVisible:
    text: "CONFIRMATION CODE|You're all set.*"
- assertVisible:
    text: "View my bookings"

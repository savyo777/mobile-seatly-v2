project_id = "exbjodmnpdiayfzrdyux"

# Authenticated-only endpoints. Each function does its own JWT decode
# internally as a belt-and-suspenders, but Supabase rejects unauthorized
# callers at the door so we don't burn cold-start cycles on them.
[functions.cenaiva-orchestrate]
verify_jwt = true

[functions.cenaiva-availability]
verify_jwt = true

[functions.cenaiva-small-prompt]
verify_jwt = true

[functions.elevenlabs-tts]
verify_jwt = true

[functions.deepgram-live-token]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.remove-restaurants]
verify_jwt = true

# Anonymous-by-design endpoints. Each one is reachable without a session
# because the flow it serves runs before sign-in:
#   - get-availability + create-public-booking power the public booking
#     widget on restaurant pages.
#   - prepare-phone-login looks up an account by phone before SMS OTP.
#     Rate-limited per IP via _shared/rate-limit.ts.
#   - register-restaurant-owner is the owner sign-up flow.
[functions.get-availability]
verify_jwt = false

[functions.create-public-booking]
verify_jwt = false

[functions.prepare-phone-login]
verify_jwt = false

[functions.register-restaurant-owner]
verify_jwt = false

# send-reservation-reminders is invoked by pg_cron (no JWT available) and
# gates itself with the X-Cron-Secret header against
# RESERVATION_REMINDER_CRON_SECRET. send-waitlist-ready-sms requires a
# signed-in staff/owner JWT to reach the row through RLS.
[functions.send-reservation-reminders]
verify_jwt = false

# Same pattern as send-reservation-reminders: pg_cron invokes with no JWT,
# the fn gates itself on X-Cron-Secret matching RESERVATION_REMINDER_CRON_SECRET.
[functions.send-post-turn-review-prompts]
verify_jwt = false

# Hourly pg_cron sweeper that converts pending restaurant_booking_fees
# rows into Stripe invoice_items. Gated on CRON_SECRET via x-cron-secret.
[functions.bill-booking-fees]
verify_jwt = false

[functions.send-waitlist-ready-sms]
verify_jwt = true

name: CodeQL

# Static analysis of the mobile + edge function JavaScript/TypeScript
# code. Catches SQL injection patterns, XSS, hardcoded crypto material,
# insecure deserialization, prototype pollution, etc. — things linters
# miss. Free for public repos via GitHub Advanced Security.
#
# Runs on every push + PR to main, plus a weekly scheduled scan so
# new CodeQL rules (added by GitHub over time) get applied to existing
# code without a code change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 08:00 UTC (~04:00 ET).
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality includes more rules than security-extended.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
